graph:
  connectors:
    feed-message-connector:
    vp-connector:
    se-connector:
    headway-connector:
    dwell-connector:
    travel-time-connector:

  sources:
    mbta-vehicle-positions:
      type: "http"
      http:
        url: "https://cdn.mbta.com/realtime/VehiclePositions.pb"
        interval: "1s"

  sinks:
    console-sink:
      type: "console"
      console:
        level: "info"
    sse-sink:
      type: "sse"
      sse:
        port: "8080"
        path: "/events"
    db-sink:
      type: "database"
      database:
        driver: "postgres"
        dsn: "postgres://tpm:tpm@postgres:5432/tpm?sslmode=disable"
    parquet-stop-events:
      type: "parquet"
      parquet:
        bucket_name: "tpm-events"
        prefix: "transit/stop_events"
        event_type: "stop_event"
        aws_region: "us-east-1"
        aws_endpoint_url: "http://minio:9000"
        aws_access_key: "minioadmin"
        aws_secret_key: "minioadmin"
      flush_interval: "60s"
      flush_threshold: 100
    parquet-headway-events:
      type: "parquet"
      parquet:
        bucket_name: "tpm-events"
        prefix: "transit/headway_events"
        event_type: "headway_event"
        aws_region: "us-east-1"
        aws_endpoint_url: "http://minio:9000"
        aws_access_key: "minioadmin"
        aws_secret_key: "minioadmin"
      flush_interval: "60s"
      flush_threshold: 100
    parquet-dwell-events:
      type: "parquet"
      parquet:
        bucket_name: "tpm-events"
        prefix: "transit/dwell_events"
        event_type: "dwell_event"
        aws_region: "us-east-1"
        aws_endpoint_url: "http://minio:9000"
        aws_access_key: "minioadmin"
        aws_secret_key: "minioadmin"
      flush_interval: "60s"
      flush_threshold: 100
    parquet-travel-time-events:
      type: "parquet"
      parquet:
        bucket_name: "tpm-events"
        prefix: "transit/travel_time_events"
        event_type: "travel_time_event"
        aws_region: "us-east-1"
        aws_endpoint_url: "http://minio:9000"
        aws_access_key: "minioadmin"
        aws_secret_key: "minioadmin"
      flush_interval: "60s"
      flush_threshold: 100

  pipelines:
    mbta-feed-message-pipeline:
      id: "mbta-feed-message-pipeline"
      agency_id: "MBTA"
      type: "feed_message"
      sources: ["mbta-vehicle-positions"]
      state_store: "mbta-feed-message-state-store"
      sinks: ["feed-message-connector"]

    vp-pipeline:
      id: "vp-pipeline"
      type: "vehicle_position"
      sources: ["feed-message-connector"]
      state_store: "vp-state-store"
      sinks: ["vp-connector", "console-sink", "sse-sink"]

    se-pipeline:
      id: "se-pipeline"
      type: "stop_event"
      sources: ["vp-connector"]
      state_store: "se-state-store"
      sinks: ["headway-connector", "dwell-connector", "travel-time-connector", "console-sink", "sse-sink", "db-sink", "parquet-stop-events"]

    headway-pipeline:
      id: "headway-pipeline"
      type: "headway_event"
      sources: ["headway-connector"]
      state_store: "headway-state-store"
      sinks: ["console-sink", "sse-sink", "db-sink", "parquet-headway-events"]

    dwell-pipeline:
      id: "dwell-pipeline"
      type: "dwell_event"
      sources: ["dwell-connector"]
      state_store: "dwell-state-store"
      sinks: ["console-sink", "sse-sink", "db-sink", "parquet-dwell-events"]

    travel-time-pipeline:
      id: "travel-time-pipeline"
      type: "travel_time"
      sources: ["travel-time-connector"]
      state_store: "travel-time-state-store"
      sinks: ["console-sink", "sse-sink", "db-sink", "parquet-travel-time-events"]
