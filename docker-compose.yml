services:
  # --- All-in-one profile: single app container runs all 6 pipelines ---
  app:
    build: .
    profiles: ["all-in-one"]
    environment:
      CONFIG_PATH: ./config/configs/all-in-one.yaml
      OTEL_EXPORTER_OTLP_ENDPOINT: alloy:4318
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      alloy:
        condition: service_started
    networks:
      - tpm

  # --- Distributed profile: ingestion container (feed_message + vehicle_position) ---
  ingestion:
    build: .
    profiles: ["distributed"]
    environment:
      CONFIG_PATH: ./config/configs/distributed-ingestion.yaml
      OTEL_EXPORTER_OTLP_ENDPOINT: alloy:4318
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      alloy:
        condition: service_started
    networks:
      - tpm

  # --- Distributed profile: processing container (stop_event + derived pipelines) ---
  processing:
    build: .
    profiles: ["distributed"]
    environment:
      CONFIG_PATH: ./config/configs/distributed-processing.yaml
      OTEL_EXPORTER_OTLP_ENDPOINT: alloy:4318
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      alloy:
        condition: service_started
    networks:
      - tpm

  # --- Shared infrastructure ---
  postgres:
    image: postgres:16-alpine
    profiles: ["all-in-one", "distributed"]
    environment:
      POSTGRES_USER: tpm
      POSTGRES_PASSWORD: tpm
      POSTGRES_DB: tpm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_create_events_tables.postgres.sql:/docker-entrypoint-initdb.d/001_create_events_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpm"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tpm

  minio:
    image: minio/minio:latest
    profiles: ["all-in-one", "distributed"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tpm

  minio-init:
    image: minio/mc:latest
    profiles: ["all-in-one", "distributed"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/tpm-events
      "
    networks:
      - tpm

  redis:
    image: redis:7-alpine
    profiles: ["distributed"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tpm

  # --- Observability stack ---
  alloy:
    image: grafana/alloy:latest
    profiles: ["all-in-one", "distributed"]
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy
      - ./logs:/tmp/app-logs/
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - tpm

  loki:
    image: grafana/loki:main
    profiles: ["all-in-one", "distributed"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - tpm

  grafana:
    image: grafana/grafana:latest
    profiles: ["all-in-one", "distributed"]
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=accessControlOnCall
      - GF_INSTALL_PLUGINS=https://storage.googleapis.com/integration-artifacts/grafana-lokiexplore-app/grafana-lokiexplore-app-latest.zip;grafana-lokiexplore-app
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - tpm

volumes:
  pgdata:
  minio-data:

networks:
  tpm:
